<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataHub — Lesson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --font-sans:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --font-mono:'DM Mono','SF Mono','Fira Code','Consolas','Courier New',monospace;
  --bg:#0D1117;--bg2:#161B22;--bg3:#21262D;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#E6EDF3;--text2:#8B949E;--text3:#6E7681;
  --green:#1A7A4A;--green-l:#9FE1CB;
  --accent:#1A7A4A;
  --radius:10px;--radius-sm:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:52px;gap:16px;position:sticky;top:0;background:rgba(13,17,23,0.97);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;}
.nav-logo{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.3px;font-family:var(--font-sans);}
.nav-logo span{color:var(--green-l);}
.nav-back{color:var(--text2);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;transition:color 0.15s;font-family:var(--font-sans);}
.nav-back:hover{color:var(--text);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.step-pills{display:flex;gap:4px;}
.sp{width:28px;height:6px;border-radius:3px;background:var(--border2);cursor:pointer;transition:all 0.2s;border:none;}
.sp.active{width:40px;}
.sp.done{background:#1A7A4A;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 52px);}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);padding:20px 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;background:var(--bg);}
.sb-section{padding:0 16px 8px;}
.sb-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);padding:16px 20px 8px;font-family:var(--font-sans);}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:background 0.15s;border-left:2px solid transparent;font-family:var(--font-sans);}
.sb-item:hover{background:var(--bg3);}
.sb-item.active{background:var(--bg3);border-left-color:var(--accent);}
.sb-item.done .sb-icon{background:var(--green);border-color:var(--green);color:#fff;}
.sb-icon{width:26px;height:26px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:var(--text3);transition:all 0.2s;font-family:var(--font-sans);}
.sb-item.active .sb-icon{border-color:var(--accent);color:var(--accent);}
.sb-name{font-size:13px;color:var(--text2);}
.sb-item.active .sb-name{color:var(--text);font-weight:500;}
.sb-time{font-size:11px;color:var(--text3);margin-left:auto;font-family:var(--font-mono);}
.sb-divider{border-top:1px solid var(--border);margin:12px 0;}
.sb-meta{padding:0 20px;}
.sb-meta-row{font-size:11px;color:var(--text3);margin-bottom:7px;display:flex;gap:6px;font-family:var(--font-sans);}
.sb-meta-row span{color:var(--text2);}

/* MAIN */
main{overflow-y:auto;}
.main-inner{padding:36px 44px 80px;max-width:860px;}

/* LESSON HEADER */
.lesson-header{margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border);}
.lesson-crumb{font-size:12px;color:var(--text3);margin-bottom:10px;font-family:var(--font-mono);display:flex;align-items:center;gap:8px;}
.crumb-sep{color:var(--border2);}
.lesson-title{font-size:30px;font-weight:600;letter-spacing:-0.6px;color:var(--text);margin-bottom:8px;line-height:1.2;}
.lesson-sub{font-size:15px;color:var(--text2);margin-bottom:16px;line-height:1.6;}
.lesson-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;font-family:var(--font-sans);}
.tag-ds{background:rgba(24,95,165,0.2);color:#B5D4F4;border:1px solid rgba(24,95,165,0.3);}
.tag-tool{background:rgba(26,122,74,0.15);color:#9FE1CB;border:1px solid rgba(26,122,74,0.25);}
.tag-time{background:rgba(133,79,11,0.2);color:#FAC775;border:1px solid rgba(133,79,11,0.3);}
.tag-skill{background:rgba(26,122,74,0.2);color:#9FE1CB;border:1px solid rgba(26,122,74,0.35);}
.tag-project{background:rgba(133,79,11,0.25);color:#FAC775;border:1px solid rgba(133,79,11,0.4);}
.tag-pre{background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--border);}

/* STEP PANELS */
.step-panel{display:none;}
.step-panel.active{display:block;}

/* PANEL HEADER */
.panel-hdr{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.panel-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0;color:#fff;font-family:var(--font-sans);}
.panel-title{font-size:20px;font-weight:600;color:var(--text);font-family:var(--font-sans);}
.panel-desc{font-size:13px;color:var(--text2);margin-top:3px;font-family:var(--font-sans);}

/* VIDEO */
.video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:var(--radius);overflow:hidden;background:var(--bg2);border:1px solid var(--border);margin-bottom:20px;}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
.video-caption{font-size:12px;color:var(--text3);margin-top:8px;font-family:var(--font-sans);}
.video-caption strong{color:var(--text2);}

/* THEORY */
.theory-section{margin-bottom:28px;}
.theory-heading{font-size:18px;font-weight:600;color:var(--text);margin-bottom:12px;font-family:var(--font-sans);}
.theory-body{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:20px;font-family:var(--font-sans);}
.theory-body p{margin-bottom:14px;}
.theory-body p:last-child{margin-bottom:0;}

/* KEY POINTS */
.keypoints{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.kp-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--bg2);border-radius:var(--radius-sm);border-left:3px solid var(--accent);}
.kp-check{font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px;}
.kp-content{flex:1;}
.kp-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;font-family:var(--font-sans);}
.kp-desc{font-size:12px;color:var(--text2);font-family:var(--font-sans);line-height:1.6;}

/* VISUAL DIAGRAM */
.diagram-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px;}
.diagram-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:16px;font-family:var(--font-sans);}

/* FORMULA CARDS */
.formula-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.formula-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color 0.15s;}
.formula-card:hover{border-color:var(--border2);}
.fc-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;font-family:var(--font-sans);}
.fc-syntax{font-family:var(--font-mono);font-size:13px;font-weight:500;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:10px;}
.fc-desc{font-size:12px;color:var(--text2);line-height:1.6;font-family:var(--font-sans);}
.fc-example{font-family:var(--font-mono);font-size:11px;margin-top:8px;padding:6px 10px;background:var(--bg3);border-radius:4px;}

/* EXAMPLE STEPS */
.example-intro{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:20px;padding:16px;background:var(--bg2);border-radius:var(--radius-sm);border-left:3px solid var(--accent);font-family:var(--font-sans);}
.example-steps{display:flex;flex-direction:column;gap:0;}
.ex-step{display:grid;grid-template-columns:44px 1fr;gap:0;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.ex-num{display:flex;align-items:flex-start;justify-content:center;padding:16px 0;font-size:13px;font-weight:700;color:#fff;font-family:var(--font-sans);}
.ex-body{padding:16px;background:var(--bg2);}
.ex-action{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;font-family:var(--font-sans);}
.ex-detail{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:10px;font-family:var(--font-sans);}
.ex-formula{font-family:var(--font-mono);font-size:13px;font-weight:500;padding:10px 14px;border-radius:var(--radius-sm);display:inline-block;margin-bottom:8px;}
.ex-result{font-size:12px;color:var(--text3);font-family:var(--font-sans);}
.ex-img{margin-top:12px;border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--bg3);}
.ex-img img{width:100%;display:block;}
.img-placeholder{width:100%;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--bg3);color:var(--text3);font-size:12px;font-family:var(--font-sans);}
.img-placeholder svg{opacity:0.3;}

/* GUIDED STEPS */
.guided-steps{display:flex;flex-direction:column;gap:8px;}
.g-step{display:grid;grid-template-columns:36px 1fr;gap:12px;padding:14px 16px;background:var(--bg2);border-radius:var(--radius-sm);border:1px solid var(--border);align-items:start;}
.g-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff;font-family:var(--font-sans);}
.g-body{}
.g-action{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;font-family:var(--font-sans);}
.g-detail{font-size:13px;color:var(--text2);line-height:1.65;font-family:var(--font-sans);}
.g-detail code{font-family:var(--font-mono);font-size:12px;background:rgba(255,255,255,0.08);padding:1px 7px;border-radius:4px;color:#9FE1CB;}
.g-tip{margin-top:8px;padding:8px 12px;background:rgba(133,79,11,0.1);border-radius:var(--radius-sm);border-left:2px solid #FAC775;font-size:12px;color:#FAC775;font-family:var(--font-sans);}

/* PRACTICE */
.practice-brief{padding:16px 20px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:20px;}
.pb-scenario{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:6px;font-family:var(--font-sans);}
.pb-text{font-size:14px;color:var(--text2);line-height:1.7;font-family:var(--font-sans);}
.practice-qs{display:flex;flex-direction:column;gap:12px;}
.pq{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.pq-header{padding:14px 16px;border-bottom:1px solid var(--border);}
.pq-num{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;font-family:var(--font-sans);}
.pq-text{font-size:14px;color:var(--text);font-weight:500;line-height:1.5;font-family:var(--font-sans);}
.pq-sub{font-size:12px;color:var(--text2);margin-top:4px;font-family:var(--font-sans);}
.pq-body{padding:14px 16px;}
.pq-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:var(--font-mono);font-size:13px;resize:vertical;min-height:52px;outline:none;transition:border-color 0.15s;}
.pq-input:focus{border-color:rgba(255,255,255,0.25);}
.pq-input::placeholder{color:var(--text3);}
.pq-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.hint-btn{font-size:12px;color:var(--text3);background:none;border:1px solid var(--border);cursor:pointer;font-family:var(--font-sans);padding:5px 12px;border-radius:20px;transition:all 0.15s;}
.hint-btn:hover{border-color:var(--border2);color:var(--text2);}
.hint-reveal{display:none;margin-top:10px;padding:10px 14px;background:rgba(133,79,11,0.08);border-radius:var(--radius-sm);border-left:2px solid #FAC775;font-size:12px;color:#FAC775;font-family:var(--font-sans);line-height:1.6;}
.hint-reveal.show{display:block;}

/* ANSWERS */
.score-summary{padding:20px 24px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);text-align:center;margin-bottom:24px;}
.ss-num{font-size:44px;font-weight:600;font-family:var(--font-mono);margin-bottom:6px;}
.ss-msg{font-size:14px;color:var(--text2);font-family:var(--font-sans);}
.ss-marks{display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap;}
.mark-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:all 0.15s;}
.mark-btn.done{background:#1A7A4A;color:#fff;border-color:#1A7A4A;}
.ans-list{display:flex;flex-direction:column;gap:10px;}
.ans-item{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.ans-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.ans-q{font-size:13px;font-weight:500;color:var(--text);font-family:var(--font-sans);}
.ans-badge{font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;background:rgba(26,122,74,0.2);color:#9FE1CB;font-family:var(--font-sans);}
.ans-body{padding:12px 16px;border-top:1px solid var(--border);}
.ans-formula{font-family:var(--font-mono);font-size:13px;font-weight:500;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:8px;display:block;}
.ans-explain{font-size:13px;color:var(--text2);line-height:1.65;font-family:var(--font-sans);}
.ans-variation{margin-top:8px;padding:8px 12px;background:var(--bg3);border-radius:var(--radius-sm);font-size:12px;color:var(--text3);font-family:var(--font-sans);}

/* HINT PAGE */
.hint-main-box{padding:20px;background:rgba(133,79,11,0.08);border-radius:var(--radius);border-left:3px solid #FAC775;margin-bottom:20px;}
.hint-main-text{font-size:14px;color:var(--text2);line-height:1.8;font-family:var(--font-sans);}
.mistakes-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
.mistakes-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;font-family:var(--font-sans);}
.mistake-item{display:flex;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.mistake-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.mi-icon{width:28px;height:28px;border-radius:6px;background:rgba(192,57,43,0.15);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.mi-body{}
.mi-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;font-family:var(--font-sans);}
.mi-text{font-size:12px;color:var(--text2);line-height:1.6;font-family:var(--font-sans);}
.mi-code{font-family:var(--font-mono);font-size:11px;margin-top:4px;padding:4px 8px;background:var(--bg3);border-radius:4px;display:inline-block;}

/* NAV BUTTONS */
.step-nav{display:flex;gap:12px;margin-top:40px;padding-top:28px;border-top:1px solid var(--border);}
.btn-prev{padding:10px 20px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-sans);transition:all 0.15s;}
.btn-prev:hover{background:var(--bg3);color:var(--text);}
.btn-next{padding:10px 22px;border-radius:var(--radius-sm);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);transition:opacity 0.15s;margin-left:auto;}
.btn-next:hover{opacity:0.85;}
.btn-complete{padding:10px 24px;border-radius:var(--radius-sm);border:none;background:#1A7A4A;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans);margin-left:auto;}
.btn-complete:hover{opacity:0.85;}

/* WHAT YOU'LL LEARN */
.learn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.learn-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;gap:10px;align-items:flex-start;}
.li-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.li-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;font-family:var(--font-sans);}
.li-desc{font-size:12px;color:var(--text2);font-family:var(--font-sans);}

/* RESPONSIVE */
@media(max-width:760px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .main-inner{padding:20px 16px 60px;}
  .formula-cards{grid-template-columns:1fr;}
  .learn-grid{grid-template-columns:1fr;}
}
</style>
</head>

/* ── diagram SVG generator ── */
function makeDiagram(lessonCode, accentColor) {
  var diagrams = {
    'L1.2': sumDiagram(accentColor),
    'L1.3': countifDiagram(accentColor),
    'L1.4': ifDiagram(accentColor),
    'L1.5': cfDiagram(accentColor),
    'L2.3': vlookupDiagram(accentColor),
    'L2.4': indexMatchDiagram(accentColor),
    'L3.5': npsDiagram(accentColor)
  };
  return diagrams[lessonCode] || defaultDiagram(lessonCode, accentColor);

    +'<div class="sb-meta-row">Time: <span>'+lesson.time+'</span></div>'
    +'<div class="sb-meta-row">Pre-req: <span>'+lesson.prereq+'</span></div>'
    +'<div class="sb-meta-row">Type: <span>'+lesson.type+'</span></div>'
    +'</div>';
  sb.innerHTML = html;
}

/* ── BUILD PILLS ── */
function buildPills() {
  var pills = document.getElementById('stepPills');
  var html = '';
  STEPS.forEach(function(s,i){
    html += '<button class="sp'+(i===0?' active':'')+'" id="pill-'+i+'" onclick="goStep('+i+')" title="'+s.name+'" style="'+(i===0?'width:40px;background:'+accentColor+';':'')+'"></button>';
  });
  pills.innerHTML = html;
}

/* ── BUILD HEADER ── */
function buildHeader() {
  var isProject = lesson.type==='Project';
  var toolTags = lesson.tools.slice(0,5).map(function(t){
    return '<span class="tag tag-tool">'+t+'</span>';
  }).join('');
  var outBg = isProject?'rgba(133,79,11,0.25)':'rgba(26,122,74,0.2)';
  var outFg = isProject?'#FAC775':'#9FE1CB';
  return '<div class="lesson-header">'
    +'<div class="lesson-crumb">'+level.code+' <span class="crumb-sep">/</span> '+lesson.code+'</div>'
    +'<div class="lesson-title">'+lesson.title+'</div>'
    +'<div class="lesson-sub">'+lesson.sub+'</div>'
    +'<div class="lesson-tags">'
    +'<span class="tag tag-ds">'+lesson.dataset+'</span>'
    +toolTags
    +'<span class="tag tag-time">'+lesson.time+'</span>'
    +'<span class="tag tag-pre">Pre-req: '+lesson.prereq+'</span>'
    +'<span class="tag" style="background:'+outBg+';color:'+outFg+';border:1px solid '+outFg+'33;">'+lesson.type+'</span>'
    +'</div></div>';
}

/* ── PANELS ── */
function navBtns(si) {
  var isLast = si===STEPS.length-1, isFirst = si===0;
  return '<div class="step-nav">'
    +(isFirst?'':'<button class="btn-prev" onclick="goStep('+(si-1)+')">\u2190 '+STEPS[si-1].name+'</button>')
    +(isLast
      ?'<button class="btn-complete" onclick="completeLesson()">Complete lesson \u2713</button>'
      :'<button class="btn-next" onclick="goStep('+(si+1)+')" style="background:'+accentColor+';">Next: '+STEPS[si+1].name+' \u2192</button>')
    +'</div>';
}

function ph(si, title, desc) {
  return '<div class="panel-hdr"><div class="panel-icon" style="background:'+accentColor+';">'+STEPS[si].icon+'</div>'
    +'<div><div class="panel-title">'+title+'</div><div class="panel-desc">'+desc+'</div></div></div>';
}

/* VIDEO */
function buildVideoPanel() {
  var vid = VIDEO_MAP[lesson.code];
  var embed = vid
    ? '<div class="video-wrap"><iframe src="https://www.youtube-nocookie.com/embed/'+vid+'?rel=0&modestbranding=1" allowfullscreen loading="lazy"></iframe></div>'
      +'<div class="video-caption"><strong>Note:</strong> Watch the full video, then come back here to read the theory and complete the practice tasks.</div>'
    : '<div style="padding:24px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);text-align:center;color:var(--text3);">Video for this lesson will be added soon.</div>';

  var whatLearn = (lesson.theory && lesson.theory.keypoints || []).map(function(k,i){
    var icons = ['📊','🔢','📋','🔍','📈','✅','🎯'];
    var parts = k.split('—');
    return '<div class="learn-item"><div class="li-icon">'+(icons[i%icons.length]||'•')+'</div>'
      +'<div><div class="li-title">'+(parts[0]||k).trim()+'</div>'
      +'<div class="li-desc">'+(parts[1]||'').trim()+'</div></div></div>';
  }).join('');

  return '<div class="step-panel active" id="panel-0">'
    +ph(0,'Video lesson','Watch before reading — gives you the full picture in one go')
    +embed
    +(whatLearn?'<div class="theory-section" style="margin-top:28px;"><div class="theory-heading">What you will learn in this lesson</div><div class="learn-grid">'+whatLearn+'</div></div>':'')
    +navBtns(0)+'</div>';
}

/* THEORY */
function buildTheoryPanel() {
  var t = lesson.theory || {};
  var kps = (t.keypoints||[]).map(function(k){
    var parts = k.split('—');
    return '<li class="kp-item"><span class="kp-check" style="color:'+accentColor+';">\u2713</span>'
      +'<div class="kp-content"><div class="kp-title">'+(parts[0]||k).trim()+'</div>'
      +(parts[1]?'<div class="kp-desc">'+parts[1].trim()+'</div>':'')
      +'</div></li>';
  }).join('');

  var diagram = makeDiagram(lesson.code, accentColor);

  return '<div class="step-panel" id="panel-1">'
    +ph(1,'Theory','Understand the concept before you try it')
    +'<div class="theory-section">'
    +'<div class="theory-heading">'+(t.heading||lesson.title)+'</div>'
    +'<div class="theory-body"><p>'+(t.body||'').replace(/\. /g,'.</p><p>')+'</p></div>'
    +(kps?'<ul class="keypoints">'+kps+'</ul>':'')
    +'</div>'
    +'<div class="diagram-wrap"><div class="diagram-title">Visual explanation</div>'+diagram+'</div>'
    +navBtns(1)+'</div>';
}

/* EXAMPLE */
function buildExamplePanel() {
  var e = lesson.example || {};
  var steps = (e.steps||[]).map(function(s,i){
    var isFormula = s.indexOf('=')!==-1;
    return '<div class="ex-step"><div class="ex-num" style="background:'+accentColor+';">'+(i+1)+'</div>'
      +'<div class="ex-body">'
      +'<div class="ex-action">Step '+(i+1)+'</div>'
      +'<div class="ex-detail">'+s+'</div>'
      +(isFormula?'<div class="ex-formula" style="background:rgba(26,122,74,0.1);color:'+accentLight+';border:1px solid rgba(26,122,74,0.2);">'+s.match(/=[^→]+/g)[0].trim()+'</div>':'')
      +'<div class="ex-img">'
      +imgPlaceholder('Screenshot — '+STEPS[2].name+' step '+(i+1), 140)
      +'</div>'
      +'</div></div>';
  });

  return '<div class="step-panel" id="panel-2">'
    +ph(2,'Worked example','Follow along in your own Excel — open the FMCG dataset while reading this')
    +'<div class="example-intro"><strong style="color:var(--text);">Scenario:</strong> '+(e.heading||'Follow this example step by step in Excel.')+'</div>'
    +'<div class="example-steps">'+steps.join('')+'</div>'
    +navBtns(2)+'</div>';
}

/* GUIDED */
function buildGuidedPanel() {
  var g = lesson.guided || [];
  var steps = g.map(function(s,i){
    var fmt = s.replace(/=[\w]+\([^)]*\)/g, function(m){ return '<code>'+m+'</code>'; })
               .replace(/(Ctrl\+[\w]+)/g,'<code>$1</code>');
    var hasTip = s.indexOf('Note:')!==-1 || s.indexOf('Tip:')!==-1;
    return '<div class="g-step"><div class="g-num" style="background:'+accentColor+';">'+(i+1)+'</div>'
      +'<div class="g-body">'
      +'<div class="g-action">Action '+(i+1)+'</div>'
      +'<div class="g-detail">'+fmt+'</div>'
      +(hasTip?'<div class="g-tip">'+s+'</div>':'')
      +'<div class="ex-img" style="margin-top:10px;">'
      +imgPlaceholder('Screenshot of Excel after step '+(i+1), 120)
      +'</div>'
      +'</div></div>';
  });

  return '<div class="step-panel" id="panel-3">'
    +ph(3,'Guided steps','Open Excel and follow these one by one — do not skip ahead')
    +'<div class="guided-steps">'+steps.join('')+'</div>'
    +navBtns(3)+'</div>';
}

/* PRACTICE */
function buildPracticePanel() {
  var t = lesson.task || {};
  var qs = (t.questions||[]).map(function(q,i){
    return '<div class="pq">'
      +'<div class="pq-header">'
        +'<div class="pq-num" style="color:'+accentColor+';">Question '+(i+1)+'</div>'
        +'<div class="pq-text">'+q+'</div>'
      +'</div>'
      +'<div class="pq-body">'
        +'<textarea class="pq-input" id="pq-'+i+'" placeholder="Type your formula or answer here... e.g. =SUM(G4:G123)" rows="2"></textarea>'
        +'<div class="pq-footer">'
          +'<button class="hint-btn" onclick="toggleHint('+i+')">Show hint</button>'
          +'<span style="font-size:11px;color:var(--text3);font-family:var(--font-sans);">Check your work in Excel first</span>'
        +'</div>'
        +'<div id="hintbox-'+i+'" class="hint-reveal">'+(t.answer_hint||'Use the formula pattern shown in the example section above.')+'</div>'
      +'</div>'
      +'</div>';
  });

  return '<div class="step-panel" id="panel-4">'
    +ph(4,'Practice task','Close the example tab — now do it yourself without looking')
    +'<div class="practice-brief">'
      +'<div class="pb-scenario">Scenario</div>'
      +'<div class="pb-text"><strong style="color:var(--text);">'+(t.heading||'Your turn')+'</strong> — '+(t.description||'Complete all questions below using the FMCG Sales dataset.')+'</div>'
    +'</div>'
    +'<div class="practice-qs">'+qs.join('')+'</div>'
    +navBtns(4)+'</div>';
}

/* ANSWERS */
function buildAnswersPanel() {
  var answers = lesson.answers || [];
  var t = lesson.task || {};
  var questions = t.questions || [];
  var marks = answers.map(function(_,i){
    return '<button class="mark-btn" id="mb-'+i+'" onclick="markAns('+i+')">Q'+(i+1)+' \u2713</button>';
  }).join('');
  var items = answers.map(function(a,i){
    return '<div class="ans-item">'
      +'<div class="ans-header">'
        +'<div class="ans-q">'+(questions[i]||'Question '+(i+1))+'</div>'
        +'<div class="ans-badge">Answer '+(i+1)+'</div>'
      +'</div>'
      +'<div class="ans-body">'
        +'<code class="ans-formula" style="background:rgba(26,122,74,0.1);color:'+accentLight+';border:1px solid rgba(26,122,74,0.2);">'+a+'</code>'
        +'<div class="ans-explain">'+( ansExplain(a, lesson.code) )+'</div>'
      +'</div>'
      +'</div>';
  }).join('');

  return '<div class="step-panel" id="panel-5">'
    +ph(5,'Check your answers','Compare your formulas — understand why each one works')
    +'<div class="score-summary">'
      +'<div class="ss-num" id="ssNum" style="color:'+accentColor+';">?/'+answers.length+'</div>'
      +'<div class="ss-msg" id="ssMsg">Tick off each question you got right</div>'
      +'<div class="ss-marks">'+marks+'</div>'
    +'</div>'
    +'<div class="ans-list">'+items+'</div>'
    +navBtns(5)+'</div>';
}

function ansExplain(formula, code) {
  if(!formula) return '';
  if(formula.indexOf('SUM')!==-1) return 'SUM adds every number in the range. The range G4:G123 covers all 120 data rows starting from row 4 (row 3 is the header).';
  if(formula.indexOf('AVERAGE')!==-1) return 'AVERAGE divides the total by the count automatically. It ignores empty cells — useful if some rows have missing data.';
  if(formula.indexOf('MIN')!==-1) return 'MIN scans the entire range and returns only the smallest value. Useful for finding worst-performing months or lowest-priced SKUs.';
  if(formula.indexOf('MAX')!==-1) return 'MAX returns only the largest value. Combined with MIN, you can calculate the range (spread) of your data.';
  if(formula.indexOf('COUNTIF')!==-1) return 'COUNTIF scans the condition range and counts every cell that exactly matches your criteria. Text criteria must be in double quotes.';
  if(formula.indexOf('SUMIF')!==-1) return 'SUMIF adds values from the sum range, but only for rows where the condition range matches your criteria.';
  if(formula.indexOf('VLOOKUP')!==-1) return 'VLOOKUP searches column 1 of your table for the lookup value, then returns the value from the column number you specified. The 0 at the end means exact match.';
  return 'This formula follows the pattern shown in the theory section. Check that your cell references match the actual column letters in your dataset.';
}

/* HINT */
function buildHintPanel() {
  var h = lesson.hint || 'Take your time. Re-read the theory and try the guided steps again before looking here.';
  var mistakes = [
    {icon:'!', title:'Formula not starting with =', text:'Every Excel formula must start with an equals sign. If you type SUM(A1:A10) without the =, Excel treats it as text, not a formula.', code:'Wrong: SUM(G4:G123) &nbsp; Correct: =SUM(G4:G123)'},
    {icon:'#', title:'Wrong cell range', text:'Count the columns carefully. If Revenue is in column I, the range is I4:I123, not G4:G123. Hover over any column header to see its letter.', code:'Check: click the first data cell and note its address in the Name Box (top left)'},
    {icon:'"', title:'Forgetting quotes around text criteria', text:'In COUNTIF and SUMIF, any text condition must be in double quotes. Numbers and cell references do not need quotes.', code:'Wrong: =COUNTIF(D4:D123,HUL) &nbsp; Correct: =COUNTIF(D4:D123,"HUL")'},
    {icon:')', title:'Missing closing bracket', text:'Every opening bracket ( needs a closing bracket ). Excel will usually show an error or suggest a fix if you\'re missing one.', code:'Wrong: =SUM(G4:G123 &nbsp; Correct: =SUM(G4:G123)'},
    {icon:'$', title:'Range shifting when dragging', text:'If you drag a formula and the range moves incorrectly, add $ signs to lock it. $G$4:$G$123 never moves. G4:G123 shifts when dragged.', code:'Lock rows and columns: =$G$4:$G$123'}
  ];
  return '<div class="step-panel" id="panel-6">'
    +ph(6,'Hints','Use this only after genuinely trying for at least 5 minutes')
    +'<div class="hint-main-box"><div class="hint-main-text">'+h+'</div></div>'
    +'<div class="mistakes-box">'
    +'<div class="mistakes-title">The 5 most common Excel mistakes — check these first</div>'
    +mistakes.map(function(m){
      return '<div class="mistake-item">'
        +'<div class="mi-icon">'+m.icon+'</div>'
        +'<div class="mi-body">'
        +'<div class="mi-title">'+m.title+'</div>'
        +'<div class="mi-text">'+m.text+'</div>'
        +'<div class="mi-code">'+m.code+'</div>'
        +'</div></div>';
    }).join('')
    +'</div>'
    +navBtns(6)+'</div>';
}

/* ── INTERACTIONS ── */
function toggleHint(i) {
  var box = document.getElementById('hintbox-'+i);
  box.classList.toggle('show');
}

function markAns(i) {
  var btn = document.getElementById('mb-'+i);
  if(btn.classList.contains('done')) return;
  btn.classList.add('done');
  markedCount++;
  document.getElementById('ssNum').textContent = markedCount+'/'+totalAns;
  if(markedCount===totalAns) document.getElementById('ssMsg').textContent='Great work! Click Complete lesson to move on.';
}

function goStep(idx) {
  if(idx<0||idx>=STEPS.length) return;
  document.getElementById('panel-'+currentStep).classList.remove('active');
  document.getElementById('si-'+currentStep).classList.remove('active');
  var oldPill=document.getElementById('pill-'+currentStep);
  oldPill.style.width='';oldPill.style.background='';
  if(idx>currentStep){
    document.getElementById('si-'+currentStep).classList.add('done');
    document.getElementById('sicon-'+currentStep).textContent='\u2713';
    oldPill.classList.add('done');oldPill.style.background='#1A7A4A';
  }
  currentStep=idx;
  document.getElementById('panel-'+currentStep).classList.add('active');
  document.getElementById('si-'+currentStep).classList.add('active');
  var np=document.getElementById('pill-'+currentStep);
  np.style.width='40px';np.style.background=accentColor;
  document.querySelector('main').scrollTop=0;
  window.scrollTo({top:0,behavior:'smooth'});
}

function completeLesson() {
  localStorage.setItem('datahub_l'+lvlIdx+'_les'+lesIdx,'complete');
  var next=lesIdx+1;
  if(next<level.lessons.length){
    if(confirm('Lesson complete! \u2713\nStart next lesson: '+level.lessons[next].code+' \u2014 '+level.lessons[next].title+'?')){
      window.location.href='lesson.html?l='+lvlIdx+'&i='+next;
    } else {
      window.location.href='index.html';
    }
  } else {
    alert('Level complete! All lessons in '+level.title+' are done. Well done!');
    window.location.href='index.html';
  }
}

/* ── BUILD ALL ── */
function init() {
  buildSidebar();
  buildPills();
  var inner = document.getElementById('mainInner');
  inner.innerHTML = buildHeader()
    + buildVideoPanel()
    + buildExamplePanel()
    + buildTheoryPanel()
    + buildGuidedPanel()
    + buildPracticePanel()
    + buildAnswersPanel()
    + buildHintPanel();
  /* reorder: video → theory → example → guided → practice → answers → hint */
  /* panels are already in correct order in HTML */
}
init();
</script>
</body>
</html>
